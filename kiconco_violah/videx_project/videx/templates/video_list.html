<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Videos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      font-size: 28px;
      color: #333;
      margin-bottom: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }

    .video-card:hover {
      transform: translateY(-5px);
    }

    .thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #ddd;
    }

    video {
      width: 100%;
      max-height: 220px;
      background: black;
    }

    .video-info {
      padding: 15px;
    }

    .video-title {
      font-size: 16px;
      font-weight: bold;
      color: #222;
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
    }

    .video-meta {
      font-size: 14px;
      color: #666;
    }

    .actions {
      margin-top: 10px;
    }

    .actions a {
      font-size: 14px;
      text-decoration: none;
      color: red;
      font-weight: bold;
    }

    .actions a:hover {
      text-decoration: underline;
    }

    .upload-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 15px;
      background: red;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .upload-link:hover {
      background: darkred;
    }

    .empty {
      color: #666;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h2>Videos</h2>

  <div class="video-grid">

    {% for video in videos %}

      <div class="video-card">

        <!-- Thumbnail -->
        {% if video.thumbnail %}
          <img src="{{ video.thumbnail.url }}" class="thumbnail">
        {% endif %}

        <!-- VIDEO PLAYER (IMPORTANT FIX) -->
        {% if video.video_file %}
          <video controls>
            <source src="{{ video.video_file.url }}" type="video/mp4">
            Your browser does not support video playback.
          </video>
        {% endif %}

        <div class="video-info">

          <!-- Title -->
          <a href="{% url 'video_detail' video.id %}" class="video-title">
            {{ video.title }}
          </a>

          <!-- Meta -->
          <div class="video-meta">
            {{ video.views }} views • {{ video.publish_date }}
          </div>

          <!-- Actions -->
          <div class="actions">
            <a href="{% url 'delete_video' video.id %}">Delete</a>
          </div>

        </div>
      </div>

    {% empty %}
      <p class="empty">No videos uploaded yet.</p>
    {% endfor %}

  </div>

  <a href="{% url 'upload_video' %}" class="upload-link">
    + Upload New Video
  </a>

</body>
</html>
